name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Linting 🧹
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
        with:
          version: 0.9.2

  format:
    name: Formatting 🎨
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting with Ruff
        uses: chartboost/ruff-action@v1
        with:
          version: 0.9.2
          args: format --check .

  test:
    name: PyTest 🐍
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: dev
      - name: Run tests
        run: pixi run -e dev test

  build:
    name: Build 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: dev
      - name: Build sdist and wheel
        run: pixi run -e dev hatch build
      - name: Verify package version
        run: pixi run python -c "import mdfactory; print(mdfactory.__version__)"
