; Example mdfactory configuration file.
;
; This file is NOT read automatically. All defaults are computed by
; mdfactory.settings using platformdirs paths. To create a user config
; run:
;
;   mdfactory config init
;
; The generated config is written to the platformdirs config location
; (e.g., ~/.config/mdfactory/config.ini on Linux,
;  ~/Library/Application Support/mdfactory/config.ini on macOS).

[cgenff]
SILCSBIODIR =

[storage]
; PARAMETERS defaults to <platformdirs.user_data_dir>/parameters
PARAMETERS =

[database]
; Set to "sqlite", "csv", or "foundry"
TYPE = sqlite

[sqlite]
; Paths default to <platformdirs.user_data_dir>/runs.db etc.
RUN_DB_PATH =
ANALYSIS_DB_PATH =

[csv]
RUN_DB_PATH =
ANALYSIS_DB_PATH =

[databases]
USE_RUN_DB = true
USE_ANALYSIS_DB = true

[foundry]
BASE_PATH = /Group Functions/mdfactory
ANALYSIS_NAME = analysis
RUN_DB_PATH = /Group Functions/mdfactory/runs
ANALYSIS_DB_PATH = /Group Functions/mdfactory/analysis
ARTIFACT_DB_PATH = /Group Functions/mdfactory/artifacts
